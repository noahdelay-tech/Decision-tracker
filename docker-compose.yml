services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: decision-tracker-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - decision-data:/app/data
    environment:
      DATABASE_URL: sqlite:///./data/decisiontracker.db
      DEBUG: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: decision-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  decision-data:
